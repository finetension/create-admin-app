name: Deploy production

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.repository.private
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      PLATFORM_NAME: ${{ vars.PLATFORM_NAME }}
      PLATFORM_DOMAIN: ${{ vars.PLATFORM_DOMAIN }}
      PLATFORM_SUBDOMAIN: ${{ vars.PLATFORM_SUBDOMAIN }}
      PLATFORM_ALLOWED_EMAILS: ${{ vars.PLATFORM_ALLOWED_EMAILS }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCESS_API_TOKEN: ${{ secrets.CLOUDFLARE_ACCESS_API_TOKEN }}
      PLATFORM_ALLOW_DEPLOY: "1"
      PLATFORM_ALLOW_REMOTE_DB_MUTATION: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Require the production branch
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            printf 'Production can only be deployed from main. Current ref: %s\n' "$GITHUB_REF" >&2
            exit 1
          fi
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run cli:build
      - name: Create deployment config
        shell: bash
        run: |
          set -euo pipefail
          for variable in PLATFORM_NAME PLATFORM_ALLOWED_EMAILS; do
            if [[ -z "${!variable:-}" ]]; then
              printf 'Missing production environment variable: %s\n' "$variable" >&2
              exit 1
            fi
          done
          init_args=(
            --name "$PLATFORM_NAME"
            --emails "$PLATFORM_ALLOWED_EMAILS"
            --force
          )
          if [[ -n "${PLATFORM_DOMAIN:-}" ]]; then
            init_args+=(--domain "$PLATFORM_DOMAIN")
            if [[ -n "${PLATFORM_SUBDOMAIN:-}" ]]; then
              init_args+=(--subdomain "$PLATFORM_SUBDOMAIN")
            fi
          else
            init_args+=(--workers-dev)
          fi
          node ./dist/cli/index.mjs init "${init_args[@]}"
      - name: Diagnose Cloudflare deployment environment
        run: node ./dist/cli/index.mjs doctor
      - name: Back up existing production D1
        run: node ./dist/cli/index.mjs db export --remote --if-exists
      - name: Deploy, migrate, and smoke-check
        run: node ./dist/cli/index.mjs deploy
      - name: Print deployed resource status
        run: node ./dist/cli/index.mjs status
      - name: Mark the tracked lifecycle as deployed
        run: node ./dist/cli/index.mjs lifecycle mark-deployed
      - name: Commit the lifecycle transition
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- infra/lifecycle.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- infra/lifecycle.json
          git commit -m "chore(infra): mark production deployed"
          git push origin HEAD:main
      - name: Upload pre-deploy D1 backup
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: d1-backup-${{ github.run_id }}
          path: backups/*.sql
          if-no-files-found: ignore
          retention-days: 30
