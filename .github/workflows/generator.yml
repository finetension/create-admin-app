name: Generator E2E

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: generator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-project:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run generator:check
      - name: Generate and verify an independent project
        shell: bash
        run: |
          set -euo pipefail
          test_root="$(mktemp -d)"
          generated_project="$test_root/generated-admin"
          package_output="$test_root/package"
          mkdir -p "$package_output"
          pnpm --filter @finetension/create-admin-app pack \
            --pack-destination "$package_output"
          package_archive="$(find "$package_output" -maxdepth 1 -name '*.tgz' -print -quit)"
          pnpm dlx "$package_archive" "$generated_project" \
            --yes \
            --name "Generated Admin" \
            --emails "admin@example.com" \
            --no-github \
            --no-cloudflare
          cd "$generated_project"
          test -f .gitignore
          test ! -e .github/workflows/publish-npm.yml
          test ! -e docs/handbook/publishing.md
          if git ls-files --error-unmatch deploy.config.json >/dev/null 2>&1; then
            printf 'deploy.config.json must not be tracked\n' >&2
            exit 1
          fi
          pnpm cli db migrate
          pnpm check
